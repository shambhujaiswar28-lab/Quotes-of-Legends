                { id: 'che-guevara', name: 'Che Guevara', category: 'Leaders And Revolutionaries', quotes: ["The revolution is not an apple that falls when it is ripe. You have to make it fall.", "I am not a liberator. Liberators do not exist. The people liberate themselves.", "If you tremble with indignation at every injustice then you are a comrade of mine.", "I don't care if I fall as long as someone else picks up my gun and keeps on shooting.", "Silence is argument carried on by other means.", "Words that do not match deeds are unimportant.", "Knowledge makes us critical, and being critical makes us revolutionary.", "Better to die standing than to live on your knees.", "We have no right to believe that freedom can be won without struggle.", "At the risk of seeming ridiculous, let me say that the true revolutionary is guided by a great feeling of love. It is impossible to think of a genuine revolutionary lacking this quality."] },
                { id: 'mahatma-gandhi', name: 'Mahatma Gandhi', category: 'Leaders And Revolutionaries', quotes: ["Be the change that you wish to see in the world.", "The weak can never forgive. Forgiveness is the attribute of the strong.", "An eye for an eye only ends up making the whole world blind.", "Happiness is when what you think, what you say, and what you do are in harmony.", "Where there is love there is life.", "My life is my message.", "The future depends on what you do today.", "The greatness of a nation and its moral progress can be judged by the way its animals are treated.", "Freedom is not worth having if it does not include the freedom to make mistakes.", "In a gentle way, you can shake the world.", "Live as if you were to die tomorrow. Learn as if you were to live forever.", "Earth provides enough to satisfy every man's needs, but not every man's greed.", "Nobody can hurt me without my permission.", "God has no religion.", "I will not let anyone walk through my mind with their dirty feet.", "There are people in the world so hungry, that God cannot appear to them except in the form of bread."] },
                { id: 'b-r-ambedkar', name: 'B. R. Ambedkar', category: 'Leaders And Revolutionaries', quotes: ["Education is the milk of a lioness — whoever drinks it will roar.", "Life should be great rather than long.", "I measure the progress of a community by the degree of progress which women have achieved.", "Be educated, be organized, and be agitated.", "A great man is different from an eminent one in that he is ready to be the servant of the society.", "Religion is for man, not man for religion.", "If I find the constitution being misused, I shall be the first to burn it.", "Lost rights are never regained by begging and by prayers but by organized and organized struggle.", "Cultivation of mind should be the ultimate aim of human existence.", "The relationship between husband and wife should be one of closest friends.", "Political tyranny is nothing compared to the social tyranny and a reformer who defies society is a more courageous man than a politician who defies government.", "So long as you do not achieve social liberty, whatever freedom is provided by the law is of no avail to you.", "Men are mortal. So are ideas. An idea needs propagation as much as a plant needs watering.", "I like the religion that teaches liberty, equality, and fraternity.", "Equality may be a fiction but nonetheless one must accept it as a governing principle.", "The strength of a community lies in its unity and organization."] },
                { id: 'abraham-lincoln', name: 'Abraham Lincoln', category: 'Leaders And Revolutionaries', quotes: ["In the end, it is not the years in your life that count — it is the life in your years.", "Give me six hours to chop down a tree and I will spend the first four sharpening the axe.", "Whatever you are, be a good one.", "My concern is not whether God is on our side; my greatest concern is to be on God's side.", "The best way to predict your future is to create it.", "No man has a good enough memory to be a successful liar.", "I am not bound to win, but I am bound to be true.", "I walk slowly, but I never walk backward.", "Those who look for the bad in people will surely find it.", "You can fool all the people some of the time and some of the people all the time, but you cannot fool all the people all the time.", "Always bear in mind that your own resolution to succeed is more important than any other thing.", "Character is like a tree and reputation is its shadow.", "The ballot is stronger than the bullet.", "Nearly all men can stand adversity, but if you want to test a man's character, give him power.", "No man is good enough to govern another man without the other's consent.", "When I do good, I feel good; when I do bad, I feel bad — and that is my religion.", "A house divided against itself cannot stand."] },
                { id: 'alexander-the-great', name: 'Alexander the Great', category: 'Leaders And Revolutionaries', quotes: ["There is nothing impossible to him who will try.", "I am not afraid of an army of lions led by a sheep; I am afraid of an army of sheep led by a lion.", "Remember, upon the conduct of each depends the fate of all.", "True refinement seeks simplicity.", "I had rather excel others in the knowledge of what is excellent than in the extent of my power and dominion.", "In the end, when it is all over — that is when the real work begins.", "Through every generation of the human race there has been a constant war — a war with fear.", "There is something noble in hearing myself ill spoken of when I am doing good.", "My logisticians are a humorless lot — they know if my campaign fails, they will be the first ones I will slay.", "How great are the dangers I face to win a good name in Athens.", "Heaven cannot brook two suns, nor earth two masters.", "I would rather live a short life of glory than a long life of obscurity.", "Upon the conduct of each depends the fate of all.", "I am indebted to my father for living, but to my teacher for living well.", "We of Macedon for generations past have been trained in the hard school of danger and war.", "A tomb now suffices him for whom the whole world was not sufficient."] },
                { id: 'sardar-vallabhbhai-patel', name: 'Sardar Vallabhbhai Patel', category: 'Leaders And Revolutionaries', quotes: ["Every Indian should now forget that he is a Rajput, a Sikh, or a Jat. He must remember that he is an Indian.", "Manpower without unity is not a strength unless it is harmonized and united properly — then it becomes a spiritual power.", "The negligence of a few can endanger the efforts of millions.", "A war based on Satyagraha is always of two kinds: one when we fight the enemy, and the other when by our good conduct we convert him.", "The iron chains of slavery have been broken, but the chains of poverty, ignorance, and superstition still remain.", "Take to the path of dharma — the path of truth and justice.", "Do not get confused between my personal faith and my duty to the nation.", "Work without expectation of reward is the highest form of service.", "Unity in diversity is India's strength.", "Small minds see differences; great minds see unity.", "My only desire is that India should be a good producer and no one should be hungry, shedding tears for food in the country.", "The nation is built not by words but by actions.", "Power without discipline is destructive.", "A true servant of the people never seeks personal glory.", "One who is the servant of all is the master of all.", "Anger is the enemy of non-violence and pride is a monster that swallows it up."] },
                { id: 'napoleon-bonaparte', name: 'Napoleon Bonaparte', category: 'Leaders And Revolutionaries', quotes: ["Never interrupt your enemy when he is making a mistake", "Courage isn't having the strength to go on it is going on when you don't have strength", "A leader is a dealer in hope", "Impossible is a word found only in the dictionary of fools", "Glory is fleeting but obscurity is forever", "The world suffers a lot not because of the violence of bad people but because of the silence of the good people", "Take time to deliberate but when the time for action comes stop thinking and go in", "Death is nothing but to live defeated and inglorious is to die daily", "There are only two forces in the world the sword and the spirit in the long run the sword will always be conquered by the spirit", "History is a set of lies agreed upon", "Imagination rules the world", "The battlefield is a scene of constant chaos the winner will be the one who controls that chaos both his own and the enemy's", "Nothing is more difficult and therefore more precious than to be able to decide", "The people to fear are not those who disagree with you but those who disagree with you and are too cowardly to let you know", "Show me a family of readers and I will show you the people who move the world", "Power is my mistress I have worked too hard at her conquest to allow anyone to take her away from me", "The reason most people fail instead of succeed is they trade what they want most for what they want at the moment", "In politics stupidity is not a handicap", "You must not fight too often with one enemy or you will teach him all your art of war", "It requires more courage to suffer than to die"] },
                { id: 'john-f-kennedy', name: 'John F Kennedy', category: 'Leaders And Revolutionaries', quotes: ["Ask not what your country can do for you ask what you can do for your country", "Change is the law of life and those who look only to the past or present are certain to miss the future", "Forgive your enemies but never forget their names", "The Chinese use two brush strokes to write the word crisis one brush stroke stands for danger the other for opportunity in a crisis be aware of the danger but recognize the opportunity", "Those who make peaceful revolution impossible will make violent revolution inevitable", "Let us never negotiate out of fear but let us never fear to negotiate", "If a free society cannot help the many who are poor it cannot save the few who are rich", "There are risks and costs to action but they are far less than the long-range risks of comfortable inaction", "The problems of the world cannot possibly be solved by skeptics or cynics whose horizons are limited by the obvious realities we need men who can dream of things that never were and ask why not", "As we express our gratitude we must never forget that the highest appreciation is not to utter words but to live by them", "A man does what he must in spite of personal consequences in spite of obstacles and dangers and this is the basis of all human morality", "Liberty without learning is always in peril learning without liberty is always in vain", "Peace is a daily a weekly a monthly process gradually changing opinions slowly eroding old barriers quietly building new structures", "Our progress as a nation can be no swifter than our progress in education the human mind is our fundamental resource", "We must use time as a tool not as a crutch", "Do not pray for easy lives pray to be stronger men", "The time to repair the roof is when the sun is shining", "Efforts and courage are not enough without purpose and direction", "A child miseducated is a child lost"] },
                { id: 'indira-gandhi', name: 'Indira Gandhi', category: 'Leaders And Revolutionaries', quotes: ["You cannot shake hands with a clenched fist", "The power to question is the basis of all human progress", "There are two kinds of people those who do the work and those who take the credit try to be in the first group there is less competition there", "Forgiveness is a virtue of the brave", "Even if I died in the service of the nation I would be proud of it every drop of my blood will contribute to the growth of this nation and to make it strong and dynamic", "A nation's strength ultimately consists in what it can do on its own and not in what it can borrow from others", "People tend to forget their duties but remember their rights", "Have a bias toward action let's see something happen now you can break that big plan into small steps and take the first step right away", "You must learn to be still in the midst of activity and to be vibrantly alive in repose", "My father was a statesman I am a political woman my father was a saint I am not", "Nothing that is worthwhile is ever easy", "Education is a liberating force and in our age it is also a democratising force cutting across the barriers of caste and class smoothing out inequalities imposed by birth and other circumstances", "To be liberated woman must feel free to be herself not in rivalry to man but in the context of her own capacity and her personality", "If I die a violent death as some fear and a few are plotting I know that the violence will be in the thought and the action of the assassins not in my dying", "I am not a person to be pressured by anybody or any nation", "Happiness is a state of mind I don't think you are permanently happy one is happy about certain things and not so happy about others", "Life is a continuous process of adjustment", "Never forget that when we are silent we are one and when we speak we are two", "All my games were political games I was like Joan of Arc perpetually being burned at the stake", "I have lived a long life and I am proud that I spent the whole of my life in the service of my people I shall continue to serve until my last breath"] },
                { id: 'karl-marx', name: 'Karl Marx', category: 'Leaders And Revolutionaries', quotes: ["The philosophers have only interpreted the world in various ways the point however is to change it", "History repeats itself first as tragedy second as farce", "Workers of the world unite you have nothing to lose but your chains", "Religion is the opium of the masses", "From each according to his abilities to each according to his needs", "The history of all previous societies has been the history of class struggles", "The ruling ideas of each age have ever been the ideas of its ruling class", "Social progress can be measured by the social position of the female sex", "The rich will do anything for the poor but get off their backs", "Men make their own history but they do not make it as they please they do not make it under self-selected circumstances but under circumstances existing already given and transmitted from the past", "Necessity is blind until it becomes conscious freedom is the consciousness of necessity", "The production of too many useful things results in too many useless people", "Capital is dead labor which vampire-like lives only by sucking living labor and lives the more the more labor it sucks", "Money is the alienated essence of man's work and existence this essence dominates him and he worships it", "The oppressed are allowed once every few years to decide which particular representatives of the oppressing class are to represent and repress them", "In the eyes of dialectical philosophy nothing is established for all times nothing is absolute or sacred", "Surround yourself with people who make you happy people who make you laugh who help you when you're in need people who genuinely care they are the ones worth keeping in your life everyone else is just passing through", "Experience praises the most happy the one who made the most people happy", "If anything is certain it is that I myself am not a Marxist", "Society does not consist of individuals but expresses the sum of interrelations the relations within which these individuals stand"] },
                { id: 'julius-caesar', name: 'Julius Caesar', category: 'Leaders And Revolutionaries', quotes: ["I came, I saw, I conquered.", "It is easier to find men who will volunteer to die, than to find those who are willing to endure pain with patience.", "Experience is the teacher of all things.", "The die is cast.", "Fortune, which has a great deal of power in other matters but especially in war, can bring about great changes in a situation through very slight forces.", "Men freely believe that which they desire.", "I love treason but hate a traitor.", "In war, events of importance are the result of trivial causes.", "Which death is preferably to every other? The unexpected.", "It is not the well-fed long-haired man I fear, but the pale and the hungry-looking."] },
                // Scientists
                { id: 'apj-abdul-kalam', name: 'APJ Abdul Kalam', category: 'Scientists', quotes: ["Dream is not that which you see while sleeping; it is something that does not let you sleep.", "You have to dream before your dreams can come true.", "Don't take rest after your first victory because if you fail in the second, more lips are waiting to say that your first victory was just luck.", "All of us do not have equal talent, but all of us have an equal opportunity to develop our talents.", "Man needs his difficulties because they are necessary to enjoy success.", "If you want to shine like a sun, first burn like a sun.", "Excellence is a continuous process and not an accident.", "Without your involvement you can't succeed; with your involvement you can't fail.", "Climbing to the top demands strength, whether it is to the top of Mount Everest or to the top of your career.", "Look at the sky. We are not alone. The whole universe is friendly to us.", "To succeed in life and achieve results, you must understand and master three mighty forces: desire, belief, and expectation.", "Be more dedicated to making solid achievements than in running after swift but synthetic happiness.", "Thinking is the capital, enterprise is the way, hard work is the solution.", "One best book is equal to a hundred good friends, but one good friend is equal to a library.", "Science is a beautiful gift to humanity; we should not distort it."] },
                { id: 'nikola-tesla', name: 'Nikola Tesla', category: 'Scientists', quotes: ["If you want to find the secrets of the universe, think in terms of energy, frequency, and vibration.", "The present is theirs; the future, for which I really worked, is mine.", "I do not think there is any thrill that can go through the human heart like that felt by the inventor as he sees some creation of the brain unfolding to success.", "Our virtues and our failings are inseparable, like force and matter. When they separate, man is no more.", "Be alone — that is the secret of invention. Be alone, that is when ideas are born.", "The scientists of today think deeply instead of clearly. One must be sane to think clearly, but one can think deeply and be quite insane.", "I do not care that they stole my idea. I care that they do not have any of their own.", "The day science begins to study non-physical phenomena, it will make more progress in one decade than in all the previous centuries of its existence.", "My brain is only a receiver. In the universe there is a core from which we obtain knowledge, strength, and inspiration.", "Life is and will ever remain an equation incapable of solution, but it contains certain known factors.", "If your hate could be turned into electricity, it would light up the whole world.", "The opinion of the world does not affect me. I have placed as the real values in my life what follows when I am dead.", "Of all things, I liked books best."] },
                { id: 'albert-einstein', name: 'Albert Einstein', category: 'Scientists', quotes: ["Imagination is more important than knowledge.", "Life is like riding a bicycle. To keep your balance, you must keep moving.", "The true sign of intelligence is not knowledge but imagination.", "Anyone who has never made a mistake has never tried anything new.", "In the middle of every difficulty lies opportunity.", "The world as we have created it is a process of our thinking. It cannot be changed without changing our thinking.", "Once you stop learning, you start dying.", "Logic will get you from A to Z; imagination will get you everywhere.", "Try not to become a man of success, but rather try to become a man of value.", "Creativity is intelligence having fun.", "The measure of intelligence is the ability to change.", "Only a life lived for others is a life worthwhile.", "If you cannot explain it simply, you do not understand it well enough.", "Weakness of attitude becomes weakness of character.", "Great spirits have always encountered violent opposition from mediocre minds.", "Science without religion is lame, religion without science is blind.", "The important thing is not to stop questioning. Curiosity has its own reason for existing."] },
                { id: 'thomas-edison', name: 'Thomas Edison', category: 'Scientists', quotes: ["I have not failed I've just found 10,000 ways that won't work", "Our greatest weakness lies in giving up the most certain way to succeed is always to try just one more time", "Genius is one percent inspiration and ninety-nine percent perspiration", "Many of life's failures are people who did not realize how close they were to success when they gave up", "Opportunity is missed by most people because it is dressed in overalls and looks like work", "If we did all the things we are capable of, we would literally astound ourselves", "There is no substitute for hard work", "The three great essentials to achieve anything worthwhile are first hard work second stick-to-itiveness third common sense", "The best thinking has been done in solitude the worst has been done in turmoil", "Just because something doesn't do what you planned it to do doesn't mean it's useless", "Negative results are just what I want they are just as valuable to me as positive results I can never find the thing that does the job best until I find the ones that don't", "I never did a day's work in my life it was all fun", "There's a way to do it better find it", "Hell, there are no rules here we're trying to accomplish something", "Discontent is the first necessity of progress", "Everything comes to him who hustles while he waits", "Your worth consists in what you are and not in what you have", "Five percent of the people think ten percent of the people think they think and the other eighty-five percent would rather die than think"] },
                // Writers
                { id: 'william-shakespeare', name: 'William Shakespeare', category: 'Writers', quotes: ["We know what we are, but know not what we may be.", "To thine own self be true.", "All the world's a stage, and all the men and women merely players.", "The course of true love never did run smooth.", "It is not in the stars to hold our destiny, but in ourselves.", "Love all, trust a few, do wrong to none.", "What a piece of work is man! How noble in reason, how infinite in faculty.", "Cowards die many times before their deaths; the valiant never taste of death but once.", "There is nothing either good or bad, but thinking makes it so.", "The robbed that smiles steals something from the thief.", "One touch of nature makes the whole world kin.", "How sharper than a serpent's tooth it is to have a thankless child.", "We are such stuff as dreams are made on, and our little life is rounded with a sleep.", "This above all: to thine own self be true, and it must follow, as the night the day, thou canst not then be false to any man.", "The quality of mercy is not strained; it droppeth as the gentle rain from heaven.", "Good night, good night! Parting is such sweet sorrow.", "What is past is prologue."] },
                { id: 'franz-kafka', name: 'Franz Kafka', category: 'Writers', quotes: ["A book must be the axe for the frozen sea within us.", "I am free and that is why I am lost.", "There is infinite hope — but not for us.", "In the fight between you and the world, back the world.", "A non-writing writer is a monster courting insanity.", "Youth is happy because it has the capacity to see beauty. Anyone who keeps the ability to see beauty never grows old.", "I am a cage in search of a bird.", "Better to have and not need than to need and not have.", "Start with what is right rather than what is acceptable.", "My guiding principle is this: guilt is never to be doubted.", "One must not cheat anybody — not even the world of its triumph.", "Productivity is being able to do things that you were never able to do before.", "We photograph things in order to drive them out of our minds.", "There are only two things worth doing in life: loving and thinking.", "Logic may indeed be unshakeable, but it cannot withstand a man who wants to go on living.", "You do not need to leave your room. Remain sitting at your table and listen.", "In argument, similes are like songs in love — they describe much but prove nothing.", "The meaning of life is that it stops."] },
                { id: 'rabindranath-tagore', name: 'Rabindranath Tagore', category: 'Writers', quotes: ["You can't cross the sea merely by standing and staring at the water.", "The highest education is that which does not merely give us information but makes our life in harmony with all existence.", "Let your life lightly dance on the edges of time like dew on the tip of a leaf.", "Faith is the bird that feels the light when the dawn is still dark.", "If you cry because the sun has gone out of your life, your tears will prevent you from seeing the stars.", "The roots below the earth claim no rewards for making the branches fruitful.", "Love is not a mere impulse; it must contain truth, which is its law.", "We read the world wrong and say that it deceives us.", "The flower which is single need not envy the thorns that are numerous.", "Do not say 'never' when your heart is bursting with tomorrow.", "A mind all logic is like a knife all blade — it makes the hand bleed that uses it.", "Where the mind is without fear and the head is held high — where knowledge is free.", "Clouds come floating into my life, no longer to carry rain or usher storm, but to add color to my sunset sky.", "The small wisdom is like water in a glass: clear, transparent, pure. The great wisdom is like the water in the sea: dark, mysterious, impenetrable.", "He who wants to do good knocks at the gate; he who loves finds the gate open.", "Beauty is truth's smile when she beholds her own face in a perfect mirror."] },
                { id: 'oscar-wilde', name: 'Oscar Wilde', category: 'Writers', quotes: ["Be yourself everyone else is already taken", "We are all in the gutter, but some of us are looking at the stars", "To live is the rarest thing in the world most people exist, that is all", "Always forgive your enemies nothing annoys them so much", "I can resist everything except temptation", "There is only one thing in life worse than being talked about and that is not being talked about", "Some cause happiness wherever they go others whenever they go", "Man is least himself when he talks in his own person give him a mask and he will tell you the truth", "Most people are other people their thoughts are someone else's opinions, their lives a mimicry, their passions a quotation", "To love oneself is the beginning of a lifelong romance", "The truth is rarely pure and never simple", "Experience is simply the name we give our mistakes", "There are only two tragedies in life one is not getting what one wants, and the other is getting it", "Women are made to be loved, not understood", "I am so clever that sometimes I don't understand a single word of what I am saying", "Men always want to be a woman's first love women like to be a man's last romance", "The only way to get rid of temptation is to yield to it", "No man is rich enough to buy back his past", "I have the simplest tastes I am always satisfied with the best", "Education is an admirable thing but it is well to remember that nothing worth knowing can be taught", "Yes I am a dreamer for a dreamer is one who can only find his way by moonlight and his punishment is that he sees the dawn before the rest of the world", "Life is far too important a thing ever to talk seriously about"] },
                { id: 'niccolo-machiavelli', name: 'Niccolò Machiavelli', category: 'Writers', quotes: ["It is better to be feared than loved, if you cannot be both.", "The ends justify the means.", "Never attempt to win by force what can be won by deception.", "Politics have no relation to morals.", "Men are driven by two principal impulses, either by love or by fear.", "The wise man does at once what the fool does eventually.", "Where the willingness is great, the difficulties cannot be great.", "One who deceives will always find those who allow themselves to be deceived.", "A return to first principles is a necessity."] },
                { id: 'helen-keller', name: 'Helen Keller', category: 'Writers', quotes: ["The best and most beautiful things in the world cannot be seen or even touched they must be felt with the heart", "The only thing worse than being blind is having sight but no vision", "When one door of happiness closes, another opens but often we look so long at the closed door that we do not see the one which has been opened for us", "Life is either a daring adventure, or nothing", "Walking with a friend in the dark is better than walking alone in the light", "Optimism is the faith that leads to achievement nothing can be done without hope and confidence", "Although the world is full of suffering, it is also full of the overcoming of it", "Character cannot be developed in ease and quiet only through experience of trial and suffering can the soul be strengthened, ambition inspired, and success achieved", "Keep your face to the sunshine and you cannot see a shadow", "Alone we can do so little together we can do so much", "Never bend your head always hold it high look the world straight in the eye", "One can never consent to creep when one feels an impulse to soar", "What we have once enjoyed we can never lose all that we love deeply becomes a part of us", "Science may have found a cure for most evils but it has found no remedy for the worst of them all the apathy of human beings", "I long to accomplish a great and noble task, but it is my chief duty to accomplish small tasks as if they were great and noble", "Do not think of today's failures, but of the success that may come tomorrow", "No pessimist ever discovered the secret of the stars, or sailed to an uncharted land, or opened a new doorway for the human spirit", "The most pathetic person in the world is someone who has sight but no vision"] }
            ];

            // Category color mapping (same as before, add Artist mapping)
            const categoryColors = {
                'All': { bg: '#6366f1', hover: '#4f46e5', lightBg: 'rgba(99,102,241,0.12)', gradient: 'linear-gradient(135deg, #6366f1 0%, #818cf8 100%)' },
                'Leaders And Revolutionaries': { bg: '#ef4444', hover: '#dc2626', lightBg: 'rgba(239,68,68,0.12)', gradient: 'linear-gradient(135deg, #ef4444 0%, #f87171 100%)' },
                'Philosophers': { bg: '#8b5cf6', hover: '#7c3aed', lightBg: 'rgba(139,92,246,0.12)', gradient: 'linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%)' },
                'Scientists': { bg: '#3b82f6', hover: '#2563eb', lightBg: 'rgba(59,130,246,0.12)', gradient: 'linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%)' },
                'Industrialists': { bg: '#f59e0b', hover: '#d97706', lightBg: 'rgba(245,158,11,0.12)', gradient: 'linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%)' },
                'Writers': { bg: '#10b981', hover: '#059669', lightBg: 'rgba(16,185,129,0.12)', gradient: 'linear-gradient(135deg, #10b981 0%, #34d399 100%)' },
                'Artist': { bg: '#ec4899', hover: '#db2777', lightBg: 'rgba(236,72,153,0.12)', gradient: 'linear-gradient(135deg, #ec4899 0%, #f472b6 100%)' },
                'Athletes': { bg: '#f97316', hover: '#ea580c', lightBg: 'rgba(249,115,22,0.12)', gradient: 'linear-gradient(135deg, #f97316 0%, #fb923c 100%)' }
            };

            // DOM refs etc. (same logic as before)
            const homeView = document.getElementById('homeView');
            const detailView = document.getElementById('detailView');
            const legendList = document.getElementById('legendList');
            const quotesList = document.getElementById('quotesList');
            const detailName = document.getElementById('detailName');
            const detailQuoteCount = document.getElementById('detailQuoteCount');
            const backButton = document.getElementById('backButton');
            const searchInput = document.getElementById('searchInput');
            const categoryFiltersDiv = document.getElementById('categoryFilters');
            const quoteCardDiv = document.getElementById('quoteOfTheDayCard');

            let currentLegendId = null;
            let isNavigating = false;
            let activeCategory = 'All';
            let currentSearchTerm = '';

            function renderQuoteOfTheDay() {
                const allQuotes = [];
                legendsData.forEach(legend => {
                    legend.quotes.forEach(q => { allQuotes.push({ text: q, author: legend.name }); });
                });
                const randomIndex = Math.floor(Math.random() * allQuotes.length);
                const selected = allQuotes[randomIndex];
                quoteCardDiv.innerHTML = `<div class="quote-card-label">✨ Quotes</div><div class="quote-card-text">"${escapeHTML(selected.text)}"</div><div class="quote-card-author">— ${escapeHTML(selected.author)}</div>`;
            }

            function buildCategoryFilters() {
                const categoriesSet = new Set(legendsData.map(l => l.category));
                const categories = ['All', ...Array.from(categoriesSet).sort()];
                categoryFiltersDiv.innerHTML = '';
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    const colors = categoryColors[cat] || categoryColors['All'];
                    btn.classList.add('category-btn');
                    if (activeCategory === cat) {
                        btn.classList.add('active');
                        btn.style.background = colors.gradient;
                        btn.style.color = '#ffffff';
                        btn.style.borderColor = 'transparent';
                        btn.style.boxShadow = '0 4px 16px ' + colors.lightBg;
                    } else {
                        btn.style.background = 'var(--bg-tertiary)';
                        btn.style.color = 'var(--text-secondary)';
                        btn.style.borderColor = 'var(--divider-strong)';
                        btn.style.boxShadow = 'none';
                    }
                    btn.innerHTML = `<span class="cat-dot" style="background:${colors.bg};"></span><span class="cat-label">${escapeHTML(cat)}</span>`;
                    btn.addEventListener('click', () => { activeCategory = cat; renderFilteredLegendList(); buildCategoryFilters(); });
                    btn.addEventListener('mouseenter', function() { if (activeCategory !== cat) { this.style.borderColor = colors.bg; this.style.color = colors.bg; this.style.boxShadow = '0 2px 12px ' + colors.lightBg; } });
                    btn.addEventListener('mouseleave', function() { if (activeCategory !== cat) { this.style.borderColor = 'var(--divider-strong)'; this.style.color = 'var(--text-secondary)'; this.style.boxShadow = 'none'; } });
                    categoryFiltersDiv.appendChild(btn);
                });
            }

            function getFilteredLegends() {
                return legendsData.filter(legend => {
                    const matchesCategory = activeCategory === 'All' || legend.category === activeCategory;
                    if (!matchesCategory) return false;
                    if (!currentSearchTerm.trim()) return true;
                    return legend.name.toLowerCase().includes(currentSearchTerm.toLowerCase());
                });
            }

            function renderFilteredLegendList() {
                const filtered = getFilteredLegends();
                legendList.innerHTML = '';
                if (filtered.length === 0) { legendList.innerHTML = '<li class="legend-item" style="animation-delay:0s;"><div style="text-align:center;padding:40px 20px;color:var(--text-tertiary);font-style:italic;">No legends found matching your search.</div></li>'; return; }
                filtered.forEach((legend, index) => {
                    const li = document.createElement('li'); li.className = 'legend-item'; li.style.animationDelay = `${index * 0.03}s`;
                    const link = document.createElement('a'); link.className = 'legend-link'; link.href = `#${legend.id}`;
                    link.innerHTML = `<span class="legend-name">${escapeHTML(legend.name)}</span><span class="legend-arrow">→</span>`;
                    link.addEventListener('click', (e) => { e.preventDefault(); navigateToLegend(legend.id); });
                    li.appendChild(link); legendList.appendChild(li);
                });
            }

            function navigateToLegend(legendId) { /* same logic */ 
                if (isNavigating) return; isNavigating = true; currentLegendId = legendId; const legend = legendsData.find(l => l.id === legendId);
                if (!legend) { isNavigating = false; return; }
                if (window.location.hash !== `#${legendId}`) history.pushState({ legendId }, '', `#${legendId}`);
                detailName.textContent = legend.name; detailQuoteCount.textContent = `${legend.quotes.length} quotes`;
                quotesList.innerHTML = ''; legend.quotes.forEach((quote, idx) => { const li = document.createElement('li'); li.className = 'quote-item'; li.style.animationDelay = `${idx * 0.06}s`; li.innerHTML = `<span class="quote-text">${escapeHTML(quote)}</span>`; quotesList.appendChild(li); });
                homeView.style.display = 'none'; detailView.classList.add('active'); detailView.style.display = 'block'; detailView.setAttribute('aria-hidden', 'false'); homeView.setAttribute('aria-hidden', 'true');
                window.scrollTo({ top: 0, behavior: 'smooth' }); setTimeout(() => backButton.focus(), 300); isNavigating = false;
            }
            function navigateToHome() { if (isNavigating) return; isNavigating = true; currentLegendId = null; if (window.location.hash) history.pushState({ legendId: null }, '', window.location.pathname); detailView.classList.remove('active'); detailView.style.display = 'none'; detailView.setAttribute('aria-hidden', 'true'); homeView.style.display = ''; homeView.setAttribute('aria-hidden', 'false'); renderFilteredLegendList(); window.scrollTo({ top: 0, behavior: 'smooth' }); isNavigating = false; }
            backButton.addEventListener('click', (e) => { e.preventDefault(); navigateToHome(); });
            window.addEventListener('popstate', (event) => { if (event.state && event.state.legendId) navigateToLegend(event.state.legendId); else navigateToHome(); });
            searchInput.addEventListener('input', (e) => { currentSearchTerm = e.target.value; renderFilteredLegendList(); buildCategoryFilters(); });

            const themeToggle = document.getElementById('themeToggle');
            function applyTheme(theme) { if (theme === 'light') { document.body.classList.add('light-mode'); themeToggle.textContent = '☀️'; } else { document.body.classList.remove('light-mode'); themeToggle.textContent = '🌙'; } localStorage.setItem('theme', theme); }
            function loadTheme() { const saved = localStorage.getItem('theme'); applyTheme(saved === 'light' ? 'light' : 'dark'); }
            themeToggle.addEventListener('click', () => { const isLight = document.body.classList.contains('light-mode'); applyTheme(isLight ? 'dark' : 'light'); });
            loadTheme();

            function handleInitialHash() { const hash = window.location.hash.replace('#', ''); if (hash && legendsData.find(l => l.id === hash)) setTimeout(() => navigateToLegend(hash), 50); else history.replaceState({ legendId: null }, '', window.location.pathname); }
            function escapeHTML(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
            function init() { renderQuoteOfTheDay(); buildCategoryFilters(); renderFilteredLegendList(); handleInitialHash(); document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && detailView.classList.contains('active')) navigateToHome(); }); const logoImg = document.querySelector('.logo-img'); if (logoImg) { logoImg.classList.add('loading'); logoImg.addEventListener('error', function() { this.style.display = 'none'; if (this.nextElementSibling) this.nextElementSibling.style.display = 'flex'; }); logoImg.addEventListener('load', () => logoImg.classList.remove('loading')); } }
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
        })();
    </script>
</body>
</html>
